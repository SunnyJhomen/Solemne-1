<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - SecurIT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Pequeños ajustes para que Bootstrap respete nuestro Dark Mode */
        .form-control, .form-select {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--text-muted);
        }
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-main);
            color: var(--text-main);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(0, 255, 163, 0.25);
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <strong style="font-family: var(--font-mono); color: var(--accent-color); font-size: 1.5rem;">> SecurIT_</strong>
            </div>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="nosotros.html">Firma</a></li>
                <li><a href="equipo.html">Expertos</a></li>
                <li><a href="recursos.html">Casos de Éxito</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contacto.html" style="color: var(--accent-color);">Solicitar Auditoría</a></li>
            </ul>
        </nav>
    </header>

    <main class="container my-5">
        <h1 class="mb-4" style="font-family: var(--font-mono); color: var(--accent-color);">> Iniciar_Protocolo_de_Contacto</h1>
        
        <div class="alert alert-success bg-transparent" style="border-color: var(--accent-color); color: var(--text-main);" role="alert">
            <strong style="color: var(--accent-color);">[INFO]</strong> Comunicación encriptada end-to-end. Un analista responderá en menos de 24 horas.
        </div>

        <div class="card mt-4" style="background-color: var(--bg-card); border: 1px solid rgba(0, 255, 163, 0.2);">
            <div class="card-body p-4">
                <form>
                    <div class="mb-3">
                        <label for="nombre" class="form-label" style="color: var(--text-muted);">Nombre de la Empresa / Organización</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Ej: CorpSec Inc.">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label" style="color: var(--text-muted);">Correo Corporativo</label>
                        <input type="email" class="form-control" id="email" placeholder="admin@empresa.com">
                    </div>

                    <div class="mb-3">
                        <label for="servicio" class="form-label" style="color: var(--text-muted);">Tipo de Auditoría Requerida</label>
                        <select class="form-select" id="servicio">
                            <option selected>Seleccione un servicio...</option>
                            <option value="1">Pentesting Web (Caja Negra/Blanca)</option>
                            <option value="2">Auditoría de Infraestructura y Redes</option>
                            <option value="3">Respuesta a Incidentes (Emergencia)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="detalles" class="form-label" style="color: var(--text-muted);">Detalles adicionales (Opcional)</label>
                        <textarea class="form-control" id="detalles" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn w-100" style="background-color: var(--accent-color); color: var(--bg-main); font-weight: bold; font-family: var(--font-mono);">
                        > EJECUTAR_ENVÍO
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SecurIT Consulting. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
