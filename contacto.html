<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - CyberGuard Solutions</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Ajustes para que Bootstrap respete el tema de CyberGuard */
        .form-control, .form-select {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: 1px solid #233554;
        }
        .form-control:focus, .form-select:focus {
            background-color: var(--primary-color);
            color: var(--text-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(100, 255, 218, 0.25);
        }
        .form-control::placeholder {
            color: rgba(204, 214, 246, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar-custom">
            <div class="logo">CyberGuard</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="equipo.html">Equipo</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
                <li><a href="faq.html">FAQ</a></li>
            </ul>
        </nav>
    </header>

    <main class="container my-5">
        <h1 class="mb-4 text-center" style="color: var(--accent-color);">Iniciar Protocolo de Contacto</h1>
        
        <div class="alert alert-success bg-transparent" style="border-color: var(--accent-color); color: var(--text-color);" role="alert">
            <strong style="color: var(--accent-color);">[INFO]</strong> Comunicación encriptada end-to-end. Un analista responderá en menos de 24 horas.
        </div>

        <div class="card mt-4" style="background: #112240; border: 1px solid #233554;">
            <div class="card-body p-4">
                <form>
                    <div class="mb-3">
                        <label for="nombre" class="form-label" style="color: var(--text-color);">Nombre de la Empresa / Organización</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Ej: CorpSec Inc.">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label" style="color: var(--text-color);">Correo Corporativo</label>
                        <input type="email" class="form-control" id="email" placeholder="admin@empresa.com">
                    </div>

                    <div class="mb-3">
                        <label for="servicio" class="form-label" style="color: var(--text-color);">Tipo de Auditoría Requerida</label>
                        <select class="form-select" id="servicio">
                            <option selected>Seleccione un servicio...</option>
                            <option value="1">Pentesting Web (Caja Negra/Blanca)</option>
                            <option value="2">Auditoría de Infraestructura y Redes</option>
                            <option value="3">Respuesta a Incidentes (Emergencia)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="detalles" class="form-label" style="color: var(--text-color);">Detalles adicionales (Opcional)</label>
                        <textarea class="form-control" id="detalles" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn w-100" style="background-color: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 12px; transition: 0.3s;" onmouseover="this.style.background='rgba(100, 255, 218, 0.1)'" onmouseout="this.style.background='transparent'">
                        EJECUTAR ENVÍO
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CyberGuard Solutions. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
